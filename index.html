<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#0d9488">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="description" content="AI Travel Assistant for China - AI旅行助手，为中国旅行提供AI智能助手">
  <title>TravelMate AI - 旅行AI助手</title>
  <link rel="stylesheet" href="/css/style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><defs><linearGradient id='g' x1='0' y1='0' x2='1' y2='1'><stop offset='0%' stop-color='%2314b8a6'/><stop offset='100%' stop-color='%230d9488'/></linearGradient></defs><rect width='32' height='32' rx='8' fill='url(%23g)'/><path d='M16 6l2.5 5.5L24 13l-4 4 1 5.5L16 20l-5 2.5 1-5.5-4-4 5.5-1.5z' fill='white' opacity='0.95'/></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'SF Pro Text', 'Helvetica Neue', 'PingFang SC', sans-serif;
      background: #f5f5f7;
    }
    #app {
      min-height: 100vh;
    }
    .loading-screen {
      position: fixed;
      inset: 0;
      z-index: 999;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: linear-gradient(180deg, #fafafa 0%, #f5f5f7 100%);
      transition: opacity 0.6s cubic-bezier(0.4, 0, 0.2, 1), visibility 0.6s;
    }
    .loading-screen.fade-out {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }
    .loading-logo {
      width: 80px;
      height: 80px;
      border-radius: 20px;
      background: linear-gradient(135deg, #14b8a6, #0d9488);
      display: flex;
      align-items: center;
      justify-content: center;
      animation: loadPulse 2s cubic-bezier(0.4, 0, 0.2, 1) infinite;
      box-shadow: 0 8px 32px rgba(20, 184, 166, 0.25);
    }
    .loading-logo svg {
      width: 40px;
      height: 40px;
    }
    @keyframes loadPulse {
      0%, 100% { transform: scale(1); box-shadow: 0 8px 32px rgba(20, 184, 166, 0.25); }
      50% { transform: scale(1.05); box-shadow: 0 12px 40px rgba(20, 184, 166, 0.35); }
    }
    .loading-text {
      margin-top: 20px;
      font-size: 15px;
      font-weight: 600;
      color: #86868b;
      letter-spacing: -0.01em;
    }
    .loading-dots {
      display: flex;
      gap: 6px;
      margin-top: 14px;
    }
    .loading-dots span {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #14b8a6;
      animation: dotPulse 1.4s infinite ease-in-out;
    }
    .loading-dots span:nth-child(2) { animation-delay: 0.2s; }
    .loading-dots span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes dotPulse {
      0%, 80%, 100% { transform: scale(0.6); opacity: 0.4; }
      40% { transform: scale(1); opacity: 1; }
    }
  </style>
</head>
<body>
  <div class="loading-screen" id="loadingScreen">
    <div class="loading-logo">
      <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M17.8 19.2 16 11l3.5-3.5C21 6 21.5 4 21 3c-1-.5-3 0-4.5 1.5L13 8 4.8 6.2c-.5-.1-.9.1-1.1.5l-.3.5c-.2.5-.1 1 .3 1.3L9 12l-2 3H4l-1 1 3 2 2 3 1-1v-3l3-2 3.5 5.3c.3.4.8.5 1.3.3l.5-.2c.4-.3.6-.7.5-1.2z"/>
      </svg>
    </div>
    <div class="loading-text">TravelMate AI</div>
    <div class="loading-dots">
      <span></span>
      <span></span>
      <span></span>
    </div>
  </div>

  <div id="app"></div>

  <script src="/js/i18n.js"></script>
  <script src="/js/app.js"></script>
  <script>
    window.addEventListener('load', () => {
      setTimeout(() => {
        const ls = document.getElementById('loadingScreen');
        if (ls) {
          ls.classList.add('fade-out');
          setTimeout(() => ls.remove(), 600);
        }
      }, 800);
    });
  </script>
</body>
</html>
