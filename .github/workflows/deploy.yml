name: Deploy to Server

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:  # 允许手动触发

jobs:
  deploy:
    name: FTP Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Prepare files for upload
        run: |
          echo "📦 准备部署文件..."
          # 列出将要上传的文件
          echo "=== 根目录文件 ==="
          ls -la index.html .htaccess css/ js/ api/ 2>/dev/null || true

      - name: Deploy via FTP (lftp)
        run: |
          sudo apt-get update && sudo apt-get install -y lftp
          
          echo "🚀 开始 FTP 部署..."
          lftp -u "${{ secrets.FTP_USERNAME }},${{ secrets.FTP_PASSWORD }}" \
            "ftp://${{ secrets.FTP_SERVER }}" <<EOF
          set ftp:ssl-allow no
          set ftp:passive-mode on
          
          # 确保目标子目录存在（新网 FTP 有时会丢失）
          mkdir -f api
          mkdir -f css
          mkdir -f js
          mkdir -f images
          
          # 上传根目录文件
          mput -O ${{ secrets.FTP_SERVER_DIR }} index.html .htaccess || true
          
          # 上传 css/
          mirror --reverse --delete --verbose \
            --exclude .gitkeep \
            --exclude "*.log" \
            css/ ${{ secrets.FTP_SERVER_DIR }}css/
          
          # 上传 js/
          mirror --reverse --delete --verbose \
            --exclude .gitkeep \
            js/ ${{ secrets.FTP_SERVER_DIR }}js/
          
          # 上传 api/（PHP 后端）
          mirror --reverse --delete --verbose \
            api/ ${{ secrets.FTP_SERVER_DIR }}api/
          
          # 上传 images/（如果存在）
          if [ -d images ]; then
            mirror --reverse --delete --verbose \
              images/ ${{ secrets.FTP_SERVER_DIR }}images/
          fi
          
          bye
          EOF
          
          echo "✅ 部署完成！"
